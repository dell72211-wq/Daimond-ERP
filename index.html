<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>💎 Diamond Business Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--p:#1d4ed8;--pl:#dbeafe;--pd:#1e3a8a;--sell:#059669;--sl:#d1fae5;--buy:#2563eb;--bl:#dbeafe;--exp:#d97706;--el:#fef3c7;--loss:#dc2626;--ll:#fee2e2;--bdr:#e2e8f0;--bg:#f0f4ff;--w:#fff;--tx:#1e293b;--mt:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;padding-bottom:70px;}
button,input,select{font-family:inherit;font-size:15px;}
input,select{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:10px;outline:none;background:var(--w);color:var(--tx);}
input:focus,select:focus{border-color:var(--p);}
label.lbl{font-size:13px;color:var(--mt);font-weight:600;margin-bottom:4px;display:block;}
.field{display:flex;flex-direction:column;margin-bottom:0;}
.hdr{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;padding:16px 16px 0;position:sticky;top:0;z-index:40;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.hdr-title{font-size:18px;font-weight:800;}
.hdr-sub{font-size:11px;opacity:.75;margin-top:2px;}
.hdr-btns{display:flex;gap:8px;}
.hdr-btn{padding:8px 12px;border-radius:9px;border:1.5px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);color:#fff;cursor:pointer;font-weight:700;font-size:13px;}
.hdr-btn.danger{background:rgba(239,68,68,0.25);border-color:rgba(239,68,68,0.4);color:#fecaca;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--bdr);display:flex;z-index:40;box-shadow:0 -2px 16px rgba(29,78,216,0.1);}
.bnav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--mt);}
.bnav-lbl.active{color:var(--p);}
.bnav-dot{width:20px;height:3px;background:var(--p);border-radius:2px;}
.content{padding:14px 14px 10px;max-width:720px;margin:0 auto;}
.page-title{font-size:17px;font-weight:800;color:var(--pd);padding:14px 14px 4px;}
.cards{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.card{background:var(--w);border-radius:14px;padding:14px 16px;flex:1;min-width:calc(50% - 6px);box-shadow:0 1px 8px rgba(29,78,216,0.08);border-left:5px solid var(--p);}
.card-lbl{font-size:10px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.card-val{font-size:16px;font-weight:800;}
.section{background:var(--w);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 8px rgba(29,78,216,0.08);}
.sec-title{font-weight:700;font-size:14px;margin-bottom:12px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bdr);gap:10px;}
.row:last-child{border-bottom:none;}
.row-main{flex:1;min-width:0;}
.row-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.row-name{font-weight:700;font-size:14px;}
.row-date{font-size:11px;color:var(--mt);}
.row-sub{font-size:12px;color:var(--mt);}
.row-amt{font-weight:700;font-size:14px;margin-top:2px;}
.row-actions{display:flex;gap:6px;flex-shrink:0;}
.act-btn{border:none;cursor:pointer;padding:8px 10px;border-radius:9px;font-size:15px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.act-edit{background:#eff6ff;color:var(--p);}
.act-del{background:#fff1f2;color:var(--loss);}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.pill-sell{background:var(--sl);color:var(--sell);}
.pill-buy{background:var(--bl);color:var(--buy);}
.pill-exp{background:var(--el);color:var(--exp);}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
.filters{display:flex;gap:6px;}
.filter-btn{padding:6px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--w);color:var(--tx);font-weight:600;cursor:pointer;font-size:13px;}
.filter-btn.active{background:var(--p);border-color:var(--p);color:#fff;}
.add-btn{padding:9px 16px;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;font-size:14px;white-space:nowrap;}
.empty{padding:36px;color:var(--mt);text-align:center;font-size:14px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--w);border-radius:20px 20px 0 0;padding:24px 18px 32px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;}
.sheet-drag{width:40px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 18px;}
.sheet-title{font-size:18px;font-weight:800;margin-bottom:16px;}
.sheet-close{float:right;border:none;background:#f1f5f9;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--mt);}
.form-grid{display:grid;gap:14px;}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.type-btns{display:flex;gap:10px;}
.type-btn{flex:1;padding:12px;border-radius:12px;border:2px solid var(--bdr);background:var(--w);font-weight:700;font-size:15px;cursor:pointer;}
.type-btn.buy-active{border-color:var(--buy);background:var(--bl);color:var(--buy);}
.type-btn.sell-active{border-color:var(--sell);background:var(--sl);color:var(--sell);}
.preview-box{padding:12px 14px;background:var(--pl);border-radius:10px;font-size:15px;font-weight:700;color:var(--pd);}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{padding:4px 10px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--w);color:var(--mt);font-size:12px;font-weight:600;cursor:pointer;}
.chip.active-p{border-color:var(--p);background:var(--pl);color:var(--pd);}
.chip.active-e{border-color:var(--exp);background:var(--el);color:var(--exp);}
.sheet-actions{display:flex;gap:10px;margin-top:22px;}
.btn-cancel{flex:1;padding:13px;border:1.5px solid var(--bdr);border-radius:12px;background:var(--w);cursor:pointer;font-weight:600;font-size:15px;color:var(--tx);}
.btn-save{flex:2;padding:13px;border:none;border-radius:12px;background:var(--p);color:#fff;cursor:pointer;font-weight:700;font-size:15px;}
.btn-save.danger{background:var(--loss);}
.confirm-box{background:var(--w);border-radius:18px;padding:28px;width:min(340px,92vw);text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
.confirm-icon{font-size:40px;margin-bottom:12px;}
.confirm-msg{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btns button{flex:1;padding:13px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;}
.pl-row{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--bdr);}
.pl-lbl{color:var(--mt);font-size:14px;}
.pl-val{font-weight:700;font-size:14px;}
.pl-result{display:flex;justify-content:space-between;padding:16px;margin-top:12px;border-radius:12px;}
.bar-row{margin-bottom:12px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.bar-bg{height:7px;background:var(--bg);border-radius:4px;}
.bar-fill{height:7px;border-radius:4px;background:var(--exp);}
.inv-card{background:var(--w);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 8px rgba(29,78,216,0.08);}
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.inv-cell{background:var(--bg);border-radius:8px;padding:8px 10px;}
.inv-cell-lbl{font-size:10px;color:var(--mt);font-weight:600;text-transform:uppercase;margin-bottom:2px;}
.inv-cell-val{font-weight:700;font-size:14px;}
.radio-opt{display:flex;align-items:center;gap:10px;padding:13px 14px;border:2px solid var(--bdr);border-radius:12px;cursor:pointer;font-weight:600;font-size:15px;margin-bottom:10px;}
.radio-opt.selected{border-color:var(--loss);background:var(--ll);}
.radio-opt input{width:18px;height:18px;accent-color:var(--loss);}
.info-box{background:var(--pl);border-radius:12px;padding:14px 16px;font-size:13px;color:var(--pd);margin-bottom:14px;}
.info-box b{display:block;font-size:14px;margin-bottom:6px;}
canvas{max-width:100%;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">💎 Diamond Manager</div>
      <div class="hdr-sub">Personal Finance & P&L Tracker</div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="showDownload()">📥</button>
      <button class="hdr-btn danger" onclick="showClear()">🗑</button>
    </div>
  </div>
</div>

<div id="page-title" class="page-title"></div>
<div class="content" id="content"></div>

<nav class="bnav">
  <button class="bnav-btn" onclick="setTab('dashboard')"><span class="bnav-icon">🏠</span><span class="bnav-lbl" id="nl-dashboard">Home</span><div id="nd-dashboard" style="display:none" class="bnav-dot"></div></button>
  <button class="bnav-btn" onclick="setTab('txns')"><span class="bnav-icon">💎</span><span class="bnav-lbl" id="nl-txns">Txns</span><div id="nd-txns" style="display:none" class="bnav-dot"></div></button>
  <button class="bnav-btn" onclick="setTab('exps')"><span class="bnav-icon">💸</span><span class="bnav-lbl" id="nl-exps">Expenses</span><div id="nd-exps" style="display:none" class="bnav-dot"></div></button>
  <button class="bnav-btn" onclick="setTab('inv')"><span class="bnav-icon">📦</span><span class="bnav-lbl" id="nl-inv">Stock</span><div id="nd-inv" style="display:none" class="bnav-dot"></div></button>
  <button class="bnav-btn" onclick="setTab('pl')"><span class="bnav-icon">📊</span><span class="bnav-lbl" id="nl-pl">P&L</span><div id="nd-pl" style="display:none" class="bnav-dot"></div></button>
</nav>

<div id="modal-overlay" style="display:none;" class="overlay" onclick="overlayClick(event)">
  <div id="modal-box"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let txns = JSON.parse(localStorage.getItem('dmnd_txns')||'[]');
let exps = JSON.parse(localStorage.getItem('dmnd_exps')||'[]');
let tab  = 'dashboard';
let txnFilter = 'all';
let chartInst = null;
let editTxnId = null;
let editExpId = null;
let pendingConfirm = null;
let clearWhat = 'all';

const DTYPES = ['Round','Princess','Oval','Emerald','Pear','Marquise','Cushion','Radiant'];
const ECATS  = ['Rent','Salary','Travel','Tools & Equipment','Electricity','Commission','Packaging','Other'];

// ── Utils ──────────────────────────────────────────────────────────────────
const fmt  = n => '₹'+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2});
const fmtN = n => Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:3});
const safeN= v => { const n=parseFloat(v); return isNaN(n)?0:n; };
const today= () => new Date().toISOString().slice(0,10);
const uid  = () => Date.now()+''+Math.floor(Math.random()*1000);
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function save(){
  localStorage.setItem('dmnd_txns',JSON.stringify(txns));
  localStorage.setItem('dmnd_exps',JSON.stringify(exps));
}

function getStats(){
  const sales=txns.filter(t=>t.type==='sell').reduce((s,t)=>s+safeN(t.amount),0);
  const purchases=txns.filter(t=>t.type==='buy').reduce((s,t)=>s+safeN(t.amount),0);
  const totalExp=exps.reduce((s,e)=>s+safeN(e.amount),0);
  return {sales,purchases,totalExp,profit:sales-purchases-totalExp};
}

function getInventory(){
  const map={};
  txns.forEach(t=>{
    const k=t.diamondType||'Other';
    if(!map[k]) map[k]={type:k,buyCarats:0,sellCarats:0,buyAmt:0};
    if(t.type==='buy'){map[k].buyCarats+=safeN(t.carats);map[k].buyAmt+=safeN(t.amount);}
    else map[k].sellCarats+=safeN(t.carats);
  });
  return Object.values(map).map(r=>{
    const avg=r.buyCarats>0?r.buyAmt/r.buyCarats:0;
    const held=r.buyCarats-r.sellCarats;
    return {...r,heldCarats:held,avgCost:avg,stockValue:held*avg};
  });
}

function getChartData(){
  const months={};
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    const k=d.toLocaleString('en-IN',{month:'short',year:'2-digit'});
    months[k]={month:k,s:0,p:0,e:0};
  }
  txns.forEach(t=>{
    const k=new Date(t.date).toLocaleString('en-IN',{month:'short',year:'2-digit'});
    if(months[k]){if(t.type==='sell')months[k].s+=safeN(t.amount);else months[k].p+=safeN(t.amount);}
  });
  exps.forEach(e=>{
    const k=new Date(e.date).toLocaleString('en-IN',{month:'short',year:'2-digit'});
    if(months[k]) months[k].e+=safeN(e.amount);
  });
  return Object.values(months);
}

// ── Nav ────────────────────────────────────────────────────────────────────
function setTab(t){
  tab=t;
  ['dashboard','txns','exps','inv','pl'].forEach(id=>{
    const nl=document.getElementById('nl-'+id);
    const nd=document.getElementById('nd-'+id);
    if(nl) nl.className='bnav-lbl'+(id===t?' active':'');
    if(nd) nd.style.display=id===t?'block':'none';
  });
  const titles={dashboard:'Dashboard',txns:'Transactions',exps:'Expenses',inv:'Inventory',pl:'P&L Report'};
  document.getElementById('page-title').textContent=titles[t]||'';
  render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const c=document.getElementById('content');
  if(tab==='dashboard') c.innerHTML=renderDashboard();
  else if(tab==='txns')  c.innerHTML=renderTxns();
  else if(tab==='exps')  c.innerHTML=renderExps();
  else if(tab==='inv')   c.innerHTML=renderInv();
  else if(tab==='pl')    c.innerHTML=renderPL();
  if(tab==='dashboard') initChart();
}

function renderDashboard(){
  const s=getStats();
  const inv=getInventory();
  const stockVal=inv.reduce((a,r)=>a+r.stockValue,0);
  const recent=txns.slice(0,5).map(t=>`
    <div class="row">
      <div class="row-main">
        <div class="row-top">
          <span class="pill ${t.type==='sell'?'pill-sell':'pill-buy'}">${t.type.toUpperCase()}</span>
          <span class="row-name">${esc(t.party)}</span>
          <span class="row-date">${t.date}</span>
        </div>
        <div class="row-sub">${esc(t.diamondType)} · ${fmtN(t.carats)} ct</div>
        <div class="row-amt" style="color:${t.type==='sell'?'var(--sell)':'var(--buy)'}">${fmt(t.amount)}</div>
      </div>
    </div>`).join('')||'<div class="empty">📭 No transactions yet.</div>';

  return `
  <div class="cards">
    <div class="card" style="border-color:var(--sell)"><div class="card-lbl">Total Sales</div><div class="card-val" style="color:var(--sell)">${fmt(s.sales)}</div></div>
    <div class="card" style="border-color:var(--buy)"><div class="card-lbl">Total Purchases</div><div class="card-val" style="color:var(--buy)">${fmt(s.purchases)}</div></div>
    <div class="card" style="border-color:var(--exp)"><div class="card-lbl">Expenses</div><div class="card-val" style="color:var(--exp)">${fmt(s.totalExp)}</div></div>
    <div class="card" style="border-color:${s.profit>=0?'var(--sell)':'var(--loss)'}"><div class="card-lbl">${s.profit>=0?'Net Profit':'Net Loss'}</div><div class="card-val" style="color:${s.profit>=0?'var(--sell)':'var(--loss)'}">${fmt(Math.abs(s.profit))}</div></div>
    <div class="card" style="border-color:var(--p);min-width:100%"><div class="card-lbl">Stock Value</div><div class="card-val" style="color:var(--p)">${fmt(stockVal)}</div></div>
  </div>
  <div class="section">
    <div class="sec-title">Monthly Overview (Last 6 Months)</div>
    <canvas id="chart" height="200"></canvas>
  </div>
  <div class="section">
    <div class="sec-title">Recent Transactions</div>
    ${recent}
  </div>`;
}

function initChart(){
  const ctx=document.getElementById('chart');
  if(!ctx||typeof Chart==='undefined') return;
  const data=getChartData();
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:data.map(d=>d.month),
      datasets:[
        {label:'Sales',data:data.map(d=>d.s),backgroundColor:'#059669',borderRadius:4},
        {label:'Purchases',data:data.map(d=>d.p),backgroundColor:'#2563eb',borderRadius:4},
        {label:'Expenses',data:data.map(d=>d.e),backgroundColor:'#d97706',borderRadius:4}
      ]
    },
    options:{responsive:true,plugins:{legend:{labels:{font:{size:11}}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>v>=1000?'₹'+(v/1000).toFixed(0)+'k':'₹'+v}}}}
  });
}

function renderTxns(){
  const filtered=txnFilter==='all'?txns:txns.filter(t=>t.type===txnFilter);
  const rows=filtered.map((t,i)=>`
    <div class="row" style="${i===filtered.length-1?'border:none':''}">
      <div class="row-main">
        <div class="row-top">
          <span class="pill ${t.type==='sell'?'pill-sell':'pill-buy'}">${t.type.toUpperCase()}</span>
          <span class="row-name">${esc(t.party)}</span>
          <span class="row-date">${t.date}</span>
        </div>
        <div class="row-sub">${esc(t.diamondType)} · ${fmtN(t.carats)} ct @ ₹${fmtN(t.rate)}/ct${t.note?' · '+esc(t.note):''}</div>
        <div class="row-amt" style="color:${t.type==='sell'?'var(--sell)':'var(--buy)'}">${fmt(t.amount)}</div>
      </div>
      <div class="row-actions">
        <button class="act-btn act-edit" onclick="openEditTxn('${t.id}')">✏️</button>
        <button class="act-btn act-del" onclick="confirmDel('transaction','${t.id}')">🗑️</button>
      </div>
    </div>`).join('')||'<div class="empty">📭 No transactions found.</div>';
  return `
  <div class="top-bar">
    <div class="filters">
      <button class="filter-btn ${txnFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      <button class="filter-btn ${txnFilter==='buy'?'active':''}" onclick="setFilter('buy')">Buy</button>
      <button class="filter-btn ${txnFilter==='sell'?'active':''}" onclick="setFilter('sell')">Sell</button>
    </div>
    <button class="add-btn" style="background:var(--p)" onclick="openAddTxn()">+ Add</button>
  </div>
  <div class="section" style="padding:0">${rows}</div>`;
}

function renderExps(){
  const total=exps.reduce((s,e)=>s+safeN(e.amount),0);
  const rows=exps.map((e,i)=>`
    <div class="row" style="${i===exps.length-1?'border:none':''}">
      <div class="row-main">
        <div class="row-top">
          <span class="pill pill-exp">${esc(e.category)}</span>
          <span class="row-date">${e.date}</span>
        </div>
        ${e.note?`<div class="row-sub">${esc(e.note)}</div>`:''}
        <div class="row-amt" style="color:var(--exp)">${fmt(e.amount)}</div>
      </div>
      <div class="row-actions">
        <button class="act-btn act-edit" onclick="openEditExp('${e.id}')">✏️</button>
        <button class="act-btn act-del" onclick="confirmDel('expense','${e.id}')">🗑️</button>
      </div>
    </div>`).join('')||'<div class="empty">📭 No expenses yet.</div>';
  return `
  <div class="top-bar">
    <span style="font-weight:700">Total: <span style="color:var(--exp)">${fmt(total)}</span></span>
    <button class="add-btn" style="background:var(--exp)" onclick="openAddExp()">+ Add</button>
  </div>
  <div class="section" style="padding:0">${rows}</div>`;
}

function renderInv(){
  const inv=getInventory();
  const stockVal=inv.reduce((a,r)=>a+r.stockValue,0);
  const cards=inv.map(r=>`
    <div class="inv-card">
      <div style="font-weight:700;font-size:15px">💎 ${esc(r.type)}</div>
      <div class="inv-grid">
        <div class="inv-cell"><div class="inv-cell-lbl">Bought</div><div class="inv-cell-val" style="color:var(--buy)">${fmtN(r.buyCarats)} ct</div></div>
        <div class="inv-cell"><div class="inv-cell-lbl">Sold</div><div class="inv-cell-val" style="color:var(--sell)">${fmtN(r.sellCarats)} ct</div></div>
        <div class="inv-cell"><div class="inv-cell-lbl">In Stock</div><div class="inv-cell-val">${fmtN(r.heldCarats)} ct</div></div>
        <div class="inv-cell"><div class="inv-cell-lbl">Stock Value</div><div class="inv-cell-val" style="color:var(--p)">${fmt(r.stockValue)}</div></div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--mt)">Avg Cost: ${fmt(r.avgCost)}/ct</div>
    </div>`).join('')||'<div class="section"><div class="empty">📭 No inventory data yet.</div></div>';
  return `<div style="font-weight:700;font-size:15px;margin-bottom:12px">Total Stock Value: <span style="color:var(--p)">${fmt(stockVal)}</span></div>${cards}`;
}

function renderPL(){
  const s=getStats();
  const cats=ECATS.map(cat=>{
    const total=exps.filter(e=>e.category===cat).reduce((a,e)=>a+safeN(e.amount),0);
    if(!total) return '';
    const pct=s.totalExp>0?(total/s.totalExp)*100:0;
    return `<div class="bar-row"><div class="bar-lbl"><span>${esc(cat)}</span><span style="font-weight:600">${fmt(total)} (${pct.toFixed(1)}%)</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
  }).join('');
  return `
  <div class="section">
    <div class="sec-title">Profit & Loss Statement</div>
    <div class="pl-row"><span class="pl-lbl">Total Sales Revenue</span><span class="pl-val" style="color:var(--sell)">+ ${fmt(s.sales)}</span></div>
    <div class="pl-row"><span class="pl-lbl">Total Purchase Cost</span><span class="pl-val" style="color:var(--buy)">− ${fmt(s.purchases)}</span></div>
    <div class="pl-row"><span class="pl-lbl">Total Expenses</span><span class="pl-val" style="color:var(--exp)">− ${fmt(s.totalExp)}</span></div>
    <div class="pl-result" style="background:${s.profit>=0?'var(--sl)':'var(--ll)'}">
      <span style="font-weight:800;font-size:16px;color:${s.profit>=0?'var(--sell)':'var(--loss)'}">${s.profit>=0?'✅ Net Profit':'❌ Net Loss'}</span>
      <span style="font-weight:800;font-size:18px;color:${s.profit>=0?'var(--sell)':'var(--loss)'}">${fmt(Math.abs(s.profit))}</span>
    </div>
  </div>
  <div class="section">
    <div class="sec-title">Expense Breakdown</div>
    ${cats||'<div style="color:var(--mt);font-size:13px">No expense data yet.</div>'}
  </div>`;
}

// ── Filter ─────────────────────────────────────────────────────────────────
function setFilter(f){ txnFilter=f; render(); }

// ── Modal ──────────────────────────────────────────────────────────────────
function showModal(html){
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal-overlay').style.display='flex';
}
function hideModal(){
  document.getElementById('modal-overlay').style.display='none';
  document.getElementById('modal-box').innerHTML='';
  editTxnId=null; editExpId=null;
}
function overlayClick(e){ if(e.target===document.getElementById('modal-overlay')) hideModal(); }

// ── Transaction Form ───────────────────────────────────────────────────────
let txnType='buy';
function openAddTxn(){ editTxnId=null; txnType='buy'; showTxnForm({type:'buy',date:today(),party:'',diamondType:'Round',carats:'',rate:'',note:''}); }
function openEditTxn(id){ const t=txns.find(t=>t.id==id); if(!t) return; editTxnId=id; txnType=t.type; showTxnForm(t); }

function showTxnForm(d){
  const preview=safeN(d.carats)>0&&safeN(d.rate)>0?`<div class="preview-box">Total: ${fmt(safeN(d.carats)*safeN(d.rate))}</div>`:'';
  const dchips=DTYPES.map(dt=>`<button class="chip ${d.diamondType===dt?'active-p':''}" onclick="setDType('${dt}')">${dt}</button>`).join('');
  showModal(`<div class="sheet">
    <div class="sheet-drag"></div>
    <button class="sheet-close" onclick="hideModal()">✕</button>
    <div class="sheet-title">${editTxnId?'Edit':'Add'} Transaction</div>
    <div class="form-grid">
      <div class="type-btns">
        <button class="type-btn ${txnType==='buy'?'buy-active':''}" id="btn-buy" onclick="setTxnType('buy')">🛒 Buy</button>
        <button class="type-btn ${txnType==='sell'?'sell-active':''}" id="btn-sell" onclick="setTxnType('sell')">💰 Sell</button>
      </div>
      <div class="field"><label class="lbl">Date *</label><input type="date" id="t-date" value="${d.date}"></div>
      <div class="field"><label class="lbl">Party Name *</label><input type="text" id="t-party" placeholder="Client / Supplier name" value="${esc(d.party)}"></div>
      <div class="field">
        <label class="lbl">Diamond Type</label>
        <input type="text" id="t-dtype" list="dtypes-list" placeholder="Type or select diamond type..." value="${esc(d.diamondType)}" oninput="refreshDTypeChips()">
        <datalist id="dtypes-list">${DTYPES.map(dt=>`<option value="${dt}">`).join('')}</datalist>
        <div class="chips" id="dtype-chips">${dchips}</div>
      </div>
      <div class="form-row2">
        <div class="field"><label class="lbl">Carats *</label><input type="number" id="t-carats" placeholder="0.000" value="${d.carats||''}" oninput="refreshPreview()"></div>
        <div class="field"><label class="lbl">Rate/Carat (₹) *</label><input type="number" id="t-rate" placeholder="0" value="${d.rate||''}" oninput="refreshPreview()"></div>
      </div>
      <div id="t-preview">${preview}</div>
      <div class="field"><label class="lbl">Note (optional)</label><input type="text" id="t-note" placeholder="Remarks..." value="${esc(d.note||'')}"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="hideModal()">Cancel</button>
      <button class="btn-save" onclick="saveTxn()">${editTxnId?'Update':'Save'}</button>
    </div>
  </div>`);
}

function setTxnType(t){
  txnType=t;
  document.getElementById('btn-buy').className='type-btn'+(t==='buy'?' buy-active':'');
  document.getElementById('btn-sell').className='type-btn'+(t==='sell'?' sell-active':'');
}

function setDType(dt){
  document.getElementById('t-dtype').value=dt;
  refreshDTypeChips();
}

function refreshDTypeChips(){
  const val=document.getElementById('t-dtype').value;
  const container=document.getElementById('dtype-chips');
  if(!container) return;
  container.innerHTML=DTYPES.map(dt=>`<button class="chip ${val===dt?'active-p':''}" onclick="setDType('${dt}')">${dt}</button>`).join('');
}

function refreshPreview(){
  const c=safeN(document.getElementById('t-carats')?.value);
  const r=safeN(document.getElementById('t-rate')?.value);
  const box=document.getElementById('t-preview');
  if(box) box.innerHTML=c>0&&r>0?`<div class="preview-box">Total: ${fmt(c*r)}</div>`:'';
}

function saveTxn(){
  const party=(document.getElementById('t-party').value||'').trim();
  const carats=safeN(document.getElementById('t-carats').value);
  const rate=safeN(document.getElementById('t-rate').value);
  if(!party){alert('Party name is required.');return;}
  if(carats<=0){alert('Enter valid carats.');return;}
  if(rate<=0){alert('Enter valid rate.');return;}
  const rec={
    id: editTxnId||uid(),
    type: txnType,
    date: document.getElementById('t-date').value||today(),
    party,
    diamondType: document.getElementById('t-dtype').value||'Round',
    carats, rate,
    amount: carats*rate,
    note: document.getElementById('t-note').value||''
  };
  if(editTxnId){ txns=txns.map(t=>t.id==editTxnId?rec:t); }
  else { txns=[rec,...txns]; }
  save(); hideModal(); render();
}

// ── Expense Form ───────────────────────────────────────────────────────────
function openAddExp(){ editExpId=null; showExpForm({date:today(),category:'Rent',amount:'',note:''}); }
function openEditExp(id){ const e=exps.find(e=>e.id==id); if(!e) return; editExpId=id; showExpForm(e); }

function showExpForm(d){
  const echips=ECATS.map(c=>`<button class="chip ${d.category===c?'active-e':''}" onclick="setECat('${c}')">${c}</button>`).join('');
  showModal(`<div class="sheet">
    <div class="sheet-drag"></div>
    <button class="sheet-close" onclick="hideModal()">✕</button>
    <div class="sheet-title">${editExpId?'Edit':'Add'} Expense</div>
    <div class="form-grid">
      <div class="field"><label class="lbl">Date *</label><input type="date" id="e-date" value="${d.date}"></div>
      <div class="field">
        <label class="lbl">Category</label>
        <input type="text" id="e-cat" list="ecats-list" placeholder="Type or select category..." value="${esc(d.category)}" oninput="refreshECatChips()">
        <datalist id="ecats-list">${ECATS.map(c=>`<option value="${c}">`).join('')}</datalist>
        <div class="chips" id="ecat-chips">${echips}</div>
      </div>
      <div class="field"><label class="lbl">Amount (₹) *</label><input type="number" id="e-amt" placeholder="0" value="${d.amount||''}"></div>
      <div class="field"><label class="lbl">Note (optional)</label><input type="text" id="e-note" placeholder="What was this for?" value="${esc(d.note||'')}"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="hideModal()">Cancel</button>
      <button class="btn-save" onclick="saveExp()">${editExpId?'Update':'Save'}</button>
    </div>
  </div>`);
}

function setECat(c){
  document.getElementById('e-cat').value=c;
  refreshECatChips();
}
function refreshECatChips(){
  const val=document.getElementById('e-cat').value;
  const container=document.getElementById('ecat-chips');
  if(!container) return;
  container.innerHTML=ECATS.map(c=>`<button class="chip ${val===c?'active-e':''}" onclick="setECat('${c}')">${c}</button>`).join('');
}

function saveExp(){
  const amt=safeN(document.getElementById('e-amt').value);
  if(amt<=0){alert('Enter a valid amount.');return;}
  const rec={
    id: editExpId||uid(),
    date: document.getElementById('e-date').value||today(),
    category: document.getElementById('e-cat').value||'Other',
    amount: amt,
    note: document.getElementById('e-note').value||''
  };
  if(editExpId){ exps=exps.map(e=>e.id==editExpId?rec:e); }
  else { exps=[rec,...exps]; }
  save(); hideModal(); render();
}

// ── Delete ─────────────────────────────────────────────────────────────────
function confirmDel(type,id){
  showModal(`<div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-msg">Delete this ${type}?<br>This cannot be undone.</div>
    <div class="confirm-btns">
      <button style="border:1.5px solid var(--bdr);background:var(--w);color:var(--tx)" onclick="hideModal()">Cancel</button>
      <button style="border:none;background:var(--loss);color:#fff" onclick="doDelete('${type}','${id}')">Delete</button>
    </div>
  </div>`);
}

function doDelete(type,id){
  if(type==='transaction') txns=txns.filter(t=>t.id!=id);
  else exps=exps.filter(e=>e.id!=id);
  save(); hideModal(); render();
}

// ── Clear ──────────────────────────────────────────────────────────────────
function showClear(){
  showModal(`<div class="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-title" style="color:var(--loss)">🗑️ Clear Data</div>
    <div style="font-size:14px;color:var(--mt);margin-bottom:16px">Choose what to delete. <b>Cannot be undone.</b></div>
    <label class="radio-opt ${clearWhat==='transactions'?'selected':''}" onclick="setClearWhat('transactions')"><input type="radio" name="cw" ${clearWhat==='transactions'?'checked':''}> Clear Transactions only</label>
    <label class="radio-opt ${clearWhat==='expenses'?'selected':''}" onclick="setClearWhat('expenses')"><input type="radio" name="cw" ${clearWhat==='expenses'?'checked':''}> Clear Expenses only</label>
    <label class="radio-opt ${clearWhat==='all'?'selected':''}" onclick="setClearWhat('all')"><input type="radio" name="cw" ${clearWhat==='all'?'checked':''}> Clear Everything</label>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="hideModal()">Cancel</button>
      <button class="btn-save danger" onclick="confirmClear()">Yes, Clear</button>
    </div>
  </div>`);
}

function setClearWhat(v){
  clearWhat=v;
  document.querySelectorAll('.radio-opt').forEach((el,i)=>{
    const vals=['transactions','expenses','all'];
    el.classList.toggle('selected',vals[i]===v);
  });
}

function confirmClear(){
  const msg=clearWhat==='all'?'Delete ALL transactions and expenses?':'Delete all '+clearWhat+'?';
  showModal(`<div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-msg">${msg}</div>
    <div class="confirm-btns">
      <button style="border:1.5px solid var(--bdr);background:var(--w);color:var(--tx)" onclick="showClear()">Back</button>
      <button style="border:none;background:var(--loss);color:#fff" onclick="doClear()">Delete</button>
    </div>
  </div>`);
}

function doClear(){
  if(clearWhat==='transactions'||clearWhat==='all'){txns=[];localStorage.removeItem('dmnd_txns');}
  if(clearWhat==='expenses'   ||clearWhat==='all'){exps=[];localStorage.removeItem('dmnd_exps');}
  save(); hideModal(); render();
}

// ── Download ───────────────────────────────────────────────────────────────
function showDownload(){
  const inv=getInventory();
  showModal(`<div class="sheet">
    <div class="sheet-drag"></div>
    <button class="sheet-close" onclick="hideModal()">✕</button>
    <div class="sheet-title">📥 Download Data</div>
    <div class="info-box">
      <b>📊 What's included:</b>
      • ${txns.length} Transactions &nbsp;• ${exps.length} Expenses<br>
      • ${inv.length} Inventory types &nbsp;• P&L Summary
    </div>
    <button class="btn-save" style="width:100%;margin-bottom:10px;font-size:16px;padding:14px" onclick="doExport()">⬇️ Download Excel File</button>
    <button class="btn-cancel" style="width:100%" onclick="hideModal()">Cancel</button>
  </div>`);
}

function doExport(){
  if(typeof XLSX==='undefined'){alert('Excel library not loaded. Please connect to internet once first.');return;}
  const wb=XLSX.utils.book_new();
  const inv=getInventory();
  const s=getStats();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(txns.length?txns.map(t=>({Date:t.date,Type:t.type.toUpperCase(),Party:t.party,'Diamond Type':t.diamondType,Carats:t.carats,'Rate/Carat':t.rate,'Amount (₹)':t.amount,Note:t.note||''})):[{Note:'No transactions'}]),'Transactions');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(exps.length?exps.map(e=>({Date:e.date,Category:e.category,'Amount (₹)':e.amount,Note:e.note||''})):[{Note:'No expenses'}]),'Expenses');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(inv.length?inv.map(r=>({'Diamond Type':r.type,'Bought (ct)':+r.buyCarats.toFixed(3),'Sold (ct)':+r.sellCarats.toFixed(3),'In Stock (ct)':+r.heldCarats.toFixed(3),'Avg Cost/ct':+r.avgCost.toFixed(2),'Stock Value (₹)':+r.stockValue.toFixed(2)})):[{Note:'No inventory'}]),'Inventory');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([{'Item':'Total Sales Revenue','Amount (₹)':+s.sales.toFixed(2)},{'Item':'Total Purchase Cost','Amount (₹)':+s.purchases.toFixed(2)},{'Item':'Total Expenses','Amount (₹)':+s.totalExp.toFixed(2)},{'Item':s.profit>=0?'Net Profit':'Net Loss','Amount (₹)':+Math.abs(s.profit).toFixed(2)}]),'P&L Summary');
  XLSX.writeFile(wb,'Diamond_Business_'+today()+'.xlsx');
  hideModal();
}

// ── Boot ───────────────────────────────────────────────────────────────────
setTab('dashboard');
</script>
</body>
</html>
